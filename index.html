<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🎁 Surprise</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    margin-top: 120px;
}
button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
#msg {
    display: none;
    margin-top: 30px;
    font-size: 22px;
}
</style>
</head>

<body>

<h1>عندي لك مفاجأة 🎂</h1>

<button onclick="show()">اضغطي هنا ❤️</button>

<div id="msg">
🎉 عيد ميلاد سعيد حبيبتي 🤍<br><br>
ربي يحققلك كل ما تتمني، ويفرح قلبك ديما 🤲✨<br>
أنا ديما معاك حتى من بعيد ❤️
</div>

<script>
function show(){
    document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
